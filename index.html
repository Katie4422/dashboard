<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>菜 · CAI-OS · 个人生活看板</title>
  <style>
/* ==========================================================
 * 个人生活看板 v2 - 视觉样式表
 * 风格：日系简约 OS-Dashboard（编辑感 · 莫兰迪 · 大留白）
 * ========================================================== */

/* -------- 色板 & 变量 -------- */
:root {
  --bg-page: #EDE8DE;
  --bg-panel: #F5F1EA;
  --bg-card: #FDFBF7;
  --bg-card-hover: #FBF8F2;

  --text-primary: #3F403D;
  --text-secondary: #77786F;
  --text-tertiary: #A5A497;

  --border-soft: #DDD8CF;
  --border-hairline: #E8E3DA;

  --token-sage: #7A8A76;
  --token-sage-soft: #B8C1B0;
  --token-blue: #7A8790;
  --token-blue-soft: #B4BDC4;
  --token-pink: #B08A85;
  --token-pink-soft: #D4BFB9;
  --token-sand: #B89870;
  --token-sand-soft: #D9C4A2;

  --token-work: #5F7460;
  --token-media: #A05E4A;
  --token-life: #C8A76A;

  --shadow-card: 0 1px 2px rgba(63, 64, 61, 0.03), 0 2px 8px rgba(63, 64, 61, 0.04);
  --shadow-brand: 0 2px 6px rgba(63, 64, 61, 0.06);

  --radius-card: 10px;
  --radius-sm: 6px;
  --radius-pill: 999px;

  --font-serif: "Songti SC", "STSong", "SimSun", "Noto Serif SC", serif;
  --font-sans: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", "Helvetica Neue", sans-serif;
  --font-num: "Inter", "SF Pro Display", -apple-system, "Helvetica Neue", sans-serif;
}

/* -------- 基础 reset -------- */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: var(--font-sans);
  color: var(--text-primary);
  background: var(--bg-page);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

button {
  font-family: inherit;
  cursor: pointer;
  background: none;
  border: none;
  color: inherit;
}

/* -------- 整体骨架 -------- */
.app {
  display: grid;
  grid-template-columns: 216px 1fr;
  min-height: 100vh;
}

/* ========================================================
 * 左侧 Sidebar
 * ======================================================== */
.sidebar {
  background: var(--bg-panel);
  border-right: 1px solid var(--border-hairline);
  padding: 28px 20px 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 28px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}

/* --- 品牌头 --- */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-logo {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--bg-card);
  border: 1px solid var(--border-soft);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-serif);
  font-size: 22px;
  color: var(--text-primary);
  box-shadow: var(--shadow-brand);
}
.brand-text { display: flex; flex-direction: column; line-height: 1.2; }
.brand-name {
  font-family: var(--font-serif);
  font-size: 17px;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}
.brand-sub {
  font-family: var(--font-num);
  font-size: 10px;
  color: var(--text-tertiary);
  letter-spacing: 2px;
  margin-top: 3px;
}

/* --- 主导航 --- */
.nav { display: flex; flex-direction: column; gap: 2px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  color: var(--text-secondary);
  font-size: 13.5px;
  transition: background 0.15s, color 0.15s;
  cursor: pointer;
}
.nav-item:hover { background: rgba(0,0,0,0.03); color: var(--text-primary); }
.nav-item.active {
  background: var(--bg-card);
  color: var(--text-primary);
  box-shadow: 0 1px 2px rgba(63,64,61,0.04);
}
.nav-icon {
  width: 16px; height: 16px;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: var(--text-tertiary);
}

/* --- 分组标题 --- */
.side-group-title {
  font-size: 11px;
  color: var(--text-tertiary);
  letter-spacing: 2px;
  margin-bottom: 8px;
}

/* --- 领域列表 --- */
.domain-list { display: flex; flex-direction: column; gap: 6px; }
.domain-item {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 4px;
  font-size: 13px;
  color: var(--text-primary);
}
.domain-dot {
  width: 8px; height: 8px; border-radius: 50%;
  flex-shrink: 0;
}
.domain-dot.sage { background: var(--token-sage); }
.domain-dot.blue { background: var(--token-blue); }
.domain-dot.pink { background: var(--token-pink); }
.domain-dot.sand { background: var(--token-sand); }
.domain-name { flex: 1; }
.domain-count {
  font-family: var(--font-num);
  font-size: 12px;
  color: var(--text-tertiary);
}

/* --- 今日情况 mini --- */
.load-list { display: flex; flex-direction: column; gap: 4px; }
.load-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 4px;
  font-size: 13px;
  color: var(--text-primary);
}
.load-item .load-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--token-sand-soft);
  margin-right: 8px;
  flex-shrink: 0;
}
.load-item .load-dot.done { background: var(--token-sage); }
.load-item .load-dot.wait { background: var(--token-pink); }
.load-value {
  font-family: var(--font-num);
  font-size: 13px;
  color: var(--text-tertiary);
}

/* ========================================================
 * 主区
 * ======================================================== */
.main {
  padding: 28px 32px 40px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  min-width: 0;
}

/* --- 主区顶行 --- */
.top-row {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 20px;
}

/* --- 卡片通用 --- */
.card {
  background: var(--bg-card);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  padding: 20px 22px;
}

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.card-head-left { display: flex; align-items: center; gap: 10px; }
.card-icon {
  width: 22px; height: 22px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center; justify-content: center;
  color: var(--text-secondary);
}
.card-title {
  font-family: var(--font-serif);
  font-size: 16px;
  color: var(--text-primary);
  letter-spacing: 0.3px;
}
.card-meta {
  font-size: 12px;
  color: var(--text-tertiary);
  font-family: var(--font-num);
}

/* ========================================================
 * 今日时间轴
 * ======================================================== */
.timeline {}

.timeline-body {
  position: relative;
  padding-left: 60px;
  min-height: 260px;
}
/* 左侧刻度竖线 */
.timeline-body::before {
  content: "";
  position: absolute;
  left: 58px;
  top: 4px;
  bottom: 4px;
  border-left: 1px dashed var(--border-soft);
}

.timeline-slot {
  position: relative;
  min-height: 44px;
  padding: 4px 0;
  display: flex;
  align-items: flex-start;
}
.timeline-slot .slot-hour {
  position: absolute;
  left: -60px;
  top: 4px;
  width: 48px;
  text-align: right;
  color: var(--text-tertiary);
  font-family: var(--font-num);
  font-size: 12px;
}

.event {
  background: var(--bg-card);
  border: 1px solid var(--border-hairline);
  border-left-width: 3px;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-left: 12px;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  transition: transform 0.15s, box-shadow 0.15s;
}
.event:hover {
  box-shadow: 0 2px 6px rgba(63,64,61,0.05);
  transform: translateY(-1px);
}
.event.color-sage { border-left-color: var(--token-sage); }
.event.color-blue { border-left-color: var(--token-blue); }
.event.color-pink { border-left-color: var(--token-pink); }
.event.color-sand { border-left-color: var(--token-sand); }
.event.color-work { border-left-color: var(--token-work); }
.event.color-media { border-left-color: var(--token-media); }
.event.done { opacity: 0.5; }
.event.done .event-title { text-decoration: line-through; }

.event-body { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
.event-title {
  font-size: 13.5px;
  color: var(--text-primary);
  font-weight: 500;
}
.event-tags {
  display: flex; gap: 6px;
  font-size: 11.5px;
  color: var(--text-tertiary);
}
.event-tags .tag { position: relative; padding-right: 8px; }
.event-tags .tag + .tag::before {
  content: "";
  position: absolute;
  left: -4px; top: 50%;
  transform: translateY(-50%);
  width: 2px; height: 2px;
  background: var(--text-tertiary);
  border-radius: 50%;
}
.event-hour {
  font-family: var(--font-num);
  font-size: 12px;
  color: var(--text-tertiary);
  flex-shrink: 0;
}

/* 时间轴空状态 */
.timeline-empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
  border: 1px dashed var(--border-soft);
  border-radius: var(--radius-sm);
  margin-left: 12px;
}

/* ========================================================
 * 今日情况 & Waiting 概览
 * ======================================================== */
.load-card {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.load-metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.metric {
  display: flex; flex-direction: column;
  padding: 10px 12px;
  background: var(--bg-panel);
  border-radius: 8px;
}
.metric-value {
  font-family: var(--font-num);
  font-size: 22px;
  color: var(--text-primary);
  font-weight: 500;
  line-height: 1.1;
}
.metric-label {
  font-size: 11.5px;
  color: var(--text-tertiary);
  margin-top: 4px;
}

.load-sub-title {
  font-size: 12px;
  color: var(--text-tertiary);
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex; justify-content: space-between;
}

.waiting-list { display: flex; flex-direction: column; gap: 8px; }
.waiting-empty {
  padding: 24px 12px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 12.5px;
  border: 1px dashed var(--border-soft);
  border-radius: var(--radius-sm);
}
.waiting-item {
  background: var(--bg-panel);
  border-radius: 8px;
  padding: 10px 12px;
  border-left: 3px solid var(--token-pink);
}
.waiting-item-title {
  font-size: 13px;
  color: var(--text-primary);
  margin-bottom: 4px;
}
.waiting-item-meta {
  font-size: 11.5px;
  color: var(--text-tertiary);
  display: flex; gap: 10px;
}
.waiting-item-meta .whom { color: var(--text-secondary); }

/* ========================================================
 * 任务池
 * ======================================================== */
.task-pool-card { }
.task-list { display: flex; flex-direction: column; gap: 4px; }
.task-item {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 4px;
  border-bottom: 1px solid var(--border-hairline);
  cursor: pointer;
}
.task-item:last-child { border-bottom: none; }
.task-item:hover .task-title { color: var(--text-primary); }

.task-check {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border-soft);
  border-radius: 50%;
  flex-shrink: 0;
  display: inline-flex;
  align-items: center; justify-content: center;
  transition: all 0.15s;
}
.task-item.done .task-check {
  background: var(--token-sage);
  border-color: var(--token-sage);
}
.task-item.done .task-check::after {
  content: "";
  width: 5px; height: 8px;
  border-right: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(45deg) translate(-1px, -1px);
}

.task-title {
  flex: 1;
  color: var(--text-secondary);
  font-size: 13.5px;
  transition: color 0.15s;
}
.task-item.done .task-title { text-decoration: line-through; color: var(--text-tertiary); }
.task-project-tag {
  font-size: 11.5px;
  color: var(--text-tertiary);
  padding: 2px 8px;
  border-radius: var(--radius-pill);
  background: var(--bg-panel);
}

.pool-empty {
  padding: 24px 12px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
  border: 1px dashed var(--border-soft);
  border-radius: var(--radius-sm);
}

/* ========================================================
 * 项目推进 grid
 * ======================================================== */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px;
}

.project-card {
  background: var(--bg-card);
  border-radius: var(--radius-card);
  padding: 16px 18px;
  box-shadow: var(--shadow-card);
  display: flex; flex-direction: column;
  gap: 12px;
  min-height: 132px;
  position: relative;
  transition: transform 0.15s, box-shadow 0.15s;
}
.project-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 3px 12px rgba(63,64,61,0.06);
}

.project-card-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}
.project-card-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
.project-icon {
  width: 26px; height: 26px;
  border-radius: 6px;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 13px;
  color: #fff;
  flex-shrink: 0;
  letter-spacing: 0;
}
.project-icon[data-token="sage"] { background: var(--token-sage); }
.project-icon[data-token="blue"] { background: var(--token-blue); }
.project-icon[data-token="pink"] { background: var(--token-pink); }
.project-icon[data-token="sand"] { background: var(--token-sand); }
.project-icon.small-text { font-size: 10px; letter-spacing: -0.5px; }

.project-name {
  font-family: var(--font-serif);
  font-size: 14.5px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-stage {
  font-family: var(--font-num);
  font-size: 12px;
  color: var(--text-tertiary);
  flex-shrink: 0;
  padding: 2px 8px;
  background: var(--bg-panel);
  border-radius: var(--radius-pill);
}
.project-percent {
  font-family: var(--font-num);
  font-size: 15px;
  color: var(--text-primary);
  font-weight: 500;
}

.project-progress {
  height: 4px;
  background: var(--bg-panel);
  border-radius: 4px;
  overflow: hidden;
}
.project-progress-fill {
  height: 100%;
  background: var(--token-sage);
  border-radius: 4px;
  transition: width 0.4s;
}
.project-card[data-token="sage"] .project-progress-fill { background: var(--token-sage); }
.project-card[data-token="blue"] .project-progress-fill { background: var(--token-blue); }
.project-card[data-token="pink"] .project-progress-fill { background: var(--token-pink); }
.project-card[data-token="sand"] .project-progress-fill { background: var(--token-sand); }

.project-subtasks {
  display: flex; gap: 6px; align-items: center;
  flex-wrap: wrap;
}
.subtask-dot {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  min-width: 44px;
}
.subtask-dot .dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--bg-panel);
  border: 1px solid var(--border-soft);
  display: inline-flex;
  align-items: center; justify-content: center;
  font-size: 11px;
  color: var(--text-tertiary);
}
.subtask-dot.done .dot {
  background: var(--token-sage);
  border-color: var(--token-sage);
  color: #fff;
}
.subtask-dot.done .dot::after {
  content: "";
  width: 4px; height: 7px;
  border-right: 1.5px solid #fff;
  border-bottom: 1.5px solid #fff;
  transform: rotate(45deg) translate(-1px, -1px);
}
.subtask-dot .subtask-label {
  font-size: 10.5px;
  color: var(--text-tertiary);
  max-width: 50px;
  text-align: center;
  line-height: 1.15;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-next {
  font-size: 12px;
  color: var(--text-tertiary);
  border-top: 1px dashed var(--border-hairline);
  padding-top: 8px;
  display: flex; gap: 6px; align-items: baseline;
}
.project-next .next-label {
  color: var(--text-tertiary);
  font-size: 11px;
  letter-spacing: 1px;
  flex-shrink: 0;
}
.project-next .next-value {
  color: var(--text-secondary);
  font-size: 12.5px;
}
.project-next .next-value.empty {
  color: var(--text-tertiary);
  font-style: italic;
}

/* 项目卡 Waiting 徽标 */
.project-waiting-badge {
  position: absolute;
  top: 12px; right: 12px;
  background: var(--token-pink-soft);
  color: var(--text-primary);
  font-size: 10.5px;
  padding: 2px 7px;
  border-radius: var(--radius-pill);
  font-family: var(--font-num);
}

/* 大 TODO 台账特殊底色 */
.project-card.is-master {
  background: linear-gradient(180deg, #F6EEE0 0%, #FCF6E9 100%);
  border: 1px dashed var(--token-sand);
  box-shadow: none;
}
.project-card.is-master .project-icon { font-size: 10px; letter-spacing: -0.5px; }
.project-card.is-master .master-hint {
  font-size: 11px;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.6);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px dashed var(--border-soft);
}

/* ========================================================
 * 领域仪表盘
 * ======================================================== */
.domains-card {}
.domains-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
}
.domain-cell {
  background: var(--bg-panel);
  border-radius: var(--radius-card);
  padding: 16px 12px;
  text-align: center;
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
}
.domain-ring {
  width: 54px; height: 54px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center; justify-content: center;
  font-family: var(--font-serif);
  font-size: 20px;
  color: #fff;
  position: relative;
}
.domain-ring::before {
  content: "";
  position: absolute;
  inset: -6px;
  border: 3px solid;
  border-radius: 50%;
  opacity: 0.35;
}
.domain-ring[data-token="sage"] { background: var(--token-sage); }
.domain-ring[data-token="sage"]::before { border-color: var(--token-sage-soft); }
.domain-ring[data-token="blue"] { background: var(--token-blue); }
.domain-ring[data-token="blue"]::before { border-color: var(--token-blue-soft); }
.domain-ring[data-token="pink"] { background: var(--token-pink); }
.domain-ring[data-token="pink"]::before { border-color: var(--token-pink-soft); }
.domain-ring[data-token="sand"] { background: var(--token-sand); }
.domain-ring[data-token="sand"]::before { border-color: var(--token-sand-soft); }

.domain-cell-name {
  font-family: var(--font-serif);
  font-size: 14px;
  color: var(--text-primary);
  margin-top: 4px;
}
.domain-cell-stat {
  font-size: 11.5px;
  color: var(--text-tertiary);
  line-height: 1.5;
}

/* ========================================================
 * 页脚
 * ======================================================== */
.footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-tertiary);
  padding: 20px 0 8px;
  letter-spacing: 1px;
}

/* ========================================================
 * 响应式
 * ======================================================== */
@media (max-width: 900px) {
  .app { grid-template-columns: 1fr; }
  .sidebar {
    position: static;
    height: auto;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 16px;
    padding: 16px 20px;
    border-right: none;
    border-bottom: 1px solid var(--border-hairline);
  }
  .brand { flex: 1 1 100%; }
  .nav, .domain-list, .load-list {
    flex: 1 1 45%;
  }
  .main { padding: 20px 18px 32px; }
  .top-row { grid-template-columns: 1fr; }
  .domains-grid { grid-template-columns: repeat(2, 1fr); }
  .projects-grid { grid-template-columns: 1fr; }
  .timeline-body { padding-left: 48px; }
  .timeline-body::before { left: 46px; }
  .timeline-slot .slot-hour { left: -48px; width: 40px; font-size: 11px; }
}



/* ── Todo Master 独立区 ── */
#todo-master {
  margin-top: 14px; padding: 16px 18px;
  background: var(--paper-2, #f5eeda);
  border: 1px solid rgba(140, 120, 80, 0.18);
  border-radius: 14px;
}

<script>
/* =================================================================
 * 渲染逻辑
 * ================================================================= */
const D = window.DASHBOARD_DATA;
const TODAY_KEY = new Date().toISOString().slice(0, 10);

/* ---- localStorage 状态：勾选完成 ---- */
function getState() {
  try {
    const raw = localStorage.getItem('dashboard-state-' + TODAY_KEY);
    return raw ? JSON.parse(raw) : { done_task_ids: [] };
  } catch (e) { return { done_task_ids: [] }; }
}
function setState(s) {
  localStorage.setItem('dashboard-state-' + TODAY_KEY, JSON.stringify(s));
}
function isDone(id) { return getState().done_task_ids.includes(id); }
function toggleDone(id) {
  const s = getState();
  const i = s.done_task_ids.indexOf(id);
  if (i >= 0) s.done_task_ids.splice(i, 1); else s.done_task_ids.push(id);
  setState(s);
  render();
}

/* ---- 品牌头 ---- */
function renderBrand() {
  document.getElementById('brand-logo').textContent = D.meta.brand_short || '菜';
  document.getElementById('brand-name').textContent = D.meta.owner || '菜';
  document.getElementById('brand-sub').textContent = D.meta.brand_long || 'CAI-OS';
  document.getElementById('footer').textContent = '— ' + (D.meta.greeting || '向上') + ' · 持续生长 —';
}

/* ---- 侧栏：领域列表 ---- */
function renderSideDomains() {
  const el = document.getElementById('side-domain-list');
  el.innerHTML = '';
  (D.domains || []).forEach(dom => {
    const count = D.projects.filter(p => p.domain === dom.id).length;
    const row = document.createElement('div');
    row.className = 'domain-item';
    row.innerHTML = `
      <span class="domain-dot ${dom.color_token}"></span>
      <span class="domain-name">${dom.name}</span>
      <span class="domain-count">${count}</span>
    `;
    el.appendChild(row);
  });
}

/* ---- 时间轴 ---- */
function renderTimeline() {
  const body = document.getElementById('timeline-body');
  const meta = document.getElementById('timeline-meta');
  body.innerHTML = '';

  /* 双时区日期（荷兰 + 北京） */
  try {
    const fmt = (tz, d) => {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(d);
      const map = {};
      parts.forEach(p => { map[p.type] = p.value; });
      return (map.year || '') + '.' + (map.month || '') + '.' + (map.day || '');
    };
    const now = new Date();
    const nlEl = document.getElementById('tz-nl');
    const bjEl = document.getElementById('tz-bj');
    if (nlEl) nlEl.textContent = fmt('Europe/Amsterdam', now) + ' NL';
    if (bjEl) bjEl.textContent = fmt('Asia/Shanghai', now) + ' CN';
  } catch(e) {}


  const events = D.timeline || [];
  meta.textContent = events.length + ' 个时间块';

  if (events.length === 0) {
    body.innerHTML = `
      <div class="timeline-empty">
        今日时间轴还是空的<br>
        <span style="font-size:12px;color:var(--text-tertiary);opacity:0.7;">告诉我几点做什么，我会填进来</span>
      </div>
    `;
    return;
  }

  // 按 hour_start 或 order 排序
  const sorted = [...events].sort((a, b) => {
    const ha = a.hour_start != null ? a.hour_start : 99;
    const hb = b.hour_start != null ? b.hour_start : 99;
    return ha - hb;
  });

  // 每个 event 一个 slot
  sorted.forEach(ev => {
    const slot = document.createElement('div');
    slot.className = 'timeline-slot';
    const hour = ev.hour_start != null
      ? String(ev.hour_start).padStart(2, '0') + ':00'
      : ev.hour_label || '待安排';

    const done = isDone(ev.id);
    const color = ev.color_token || 'sage';
    slot.innerHTML = `
      <span class="slot-hour">${hour}</span>
      <div class="event color-${color} ${done ? 'done' : ''}" onclick="toggleDone('${ev.id}')">
        <div class="event-body">
          <div class="event-title">${escapeHtml(ev.title)}</div>
          <div class="event-tags">
            ${ev.project_name ? `<span class="tag">${escapeHtml(ev.project_name)}</span>` : ''}
            ${ev.tag ? `<span class="tag">${escapeHtml(ev.tag)}</span>` : ''}
          </div>
        </div>
        <div class="event-hour">${ev.duration || ''}</div>
      </div>
    `;
    body.appendChild(slot);
  });
}

/* ---- 任务池 ---- */
function renderTasks() {
  const el = document.getElementById('task-list');
  const meta = document.getElementById('task-meta');
  el.innerHTML = '';
  const tasks = D.tasks || [];
  meta.textContent = tasks.length + ' 项待推进';

  if (tasks.length === 0) {
    el.innerHTML = `
      <div class="pool-empty">
        任务池空着 · 从大 TODO 挑今日事项填进来
      </div>
    `;
    return;
  }

  const list = document.createElement('div');
  list.className = 'task-list';
  tasks.forEach(t => {
    const done = isDone(t.id);
    const row = document.createElement('div');
    row.className = 'task-item' + (done ? ' done' : '');
    row.onclick = () => toggleDone(t.id);
    row.innerHTML = `
      <span class="task-check"></span>
      <span class="task-title">${escapeHtml(t.title)}</span>
      ${t.project_name ? `<span class="task-project-tag">${escapeHtml(t.project_name)}</span>` : ''}
    `;
    list.appendChild(row);
  });
  el.appendChild(list);
}

/* ---- 项目卡 ---- */
function renderProjects() {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = '';

  D.projects.forEach(p => {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.setAttribute('data-token', p.color_token || 'sage');
    card.setAttribute('data-project-id', p.id);
    card.style.cursor = 'pointer';
    if (p.is_master_todo) card.classList.add('is-master');
    card.addEventListener('click', (e) => { e.stopPropagation(); openProjectModal(p.id); });

    const percent = (p.progress_percent != null) ? p.progress_percent : null;
    const stageText = p.stage || '—';
    const label = p.short_label || (p.name || '').slice(0, 1);

    const waitBadge = (p.waiting && p.waiting.length > 0)
      ? `<span class="project-waiting-badge">Waiting List ${p.waiting.length}</span>`
      : '';

    const subtaskHtml = (p.subtasks && p.subtasks.length > 0) ? `
      <div class="project-subtasks">
        ${p.subtasks.map(s => `
          <div class="subtask-dot ${s.done ? 'done' : ''}">
            <span class="dot"></span>
            <span class="subtask-label">${escapeHtml(s.title)}</span>
          </div>
        `).join('')}
      </div>` : '';

    const rightSide = (percent != null)
      ? `<span class="project-percent">${percent}%</span>`
      : `<span class="project-stage">${escapeHtml(stageText)}</span>`;

    const progressBar = (percent != null) ? `
      <div class="project-progress">
        <div class="project-progress-fill" style="width:${percent}%"></div>
      </div>` : '';

    const masterHint = p.is_master_todo ? `
      <div class="master-hint">大台账入口 · 从这里挑今日事项到任务池</div>` : '';

    const nextStep = p.next_step
      ? `<span class="next-value">${escapeHtml(p.next_step)}</span>`
      : `<span class="next-value empty">下一步待定</span>`;

    card.innerHTML = `
      ${waitBadge}
      <div class="project-card-head">
        <div class="project-card-left">
          <span class="project-icon ${label.length >= 3 ? 'small-text' : ''}" data-token="${p.color_token}">${escapeHtml(label)}</span>
          <span class="project-name" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</span>
        </div>
        ${rightSide}
      </div>
      ${progressBar}
      ${subtaskHtml}
      ${masterHint}
      <div class="project-next">
        <span class="next-label">下一步</span>
        ${nextStep}
      </div>
    `;
    grid.appendChild(card);
  });
}

/* ---- Waiting 汇总 ---- */
function renderWaiting() {
  const list = document.getElementById('waiting-list');
  const cnt = document.getElementById('waiting-count');
  list.innerHTML = '';

  const items = [];
  D.projects.forEach(p => {
    (p.waiting || []).forEach(w => {
      items.push({ ...w, project_name: p.name, project_id: p.id });
    });
  });
  cnt.textContent = items.length;
  document.getElementById('side-wait').textContent = items.length;

  if (items.length === 0) {
    list.innerHTML = `<div class="waiting-empty">目前没有等待中的事项</div>`;
    return;
  }

  items.forEach(w => {
    const days = w.since ? daysSince(w.since) : null;
    const el = document.createElement('div');
    el.className = 'waiting-item';
    el.innerHTML = `
      <div class="waiting-item-title">${escapeHtml(w.item)}</div>
      <div class="waiting-item-meta">
        ${w.whom ? `<span class="whom">等 ${escapeHtml(w.whom)}</span>` : ''}
        <span>${escapeHtml(w.project_name)}</span>
        ${days != null ? `<span>· 已等 ${days} 天</span>` : ''}
      </div>
    `;
    list.appendChild(el);
  });
}

/* ---- 领域仪表盘 ---- */
function renderDomainsGrid() {
  const grid = document.getElementById('domains-grid');
  grid.innerHTML = '';
  (D.domains || []).forEach(dom => {
    const projs = D.projects.filter(p => p.domain === dom.id);
    const waitingCnt = projs.reduce((n, p) => n + (p.waiting?.length || 0), 0);
    const cell = document.createElement('div');
    cell.className = 'domain-cell';
    cell.innerHTML = `
      <div class="domain-ring" data-token="${dom.color_token}">${escapeHtml(dom.icon_glyph || '·')}</div>
      <div class="domain-cell-name">${escapeHtml(dom.name)}</div>
      <div class="domain-cell-stat">
        ${projs.length} 个项目<br>
        ${waitingCnt} 项 Waiting List
      </div>
    `;
    grid.appendChild(cell);
  });
}

/* ---- 顶部大数字负载 ---- */
function renderMetrics() {
  const events = D.timeline || [];
  const tasks = D.tasks || [];
  const state = getState();

  const slots = events.length;
  const doneCnt = state.done_task_ids.filter(id =>
    events.some(e => e.id === id) || tasks.some(t => t.id === id)
  ).length;

  // 已占用时长（h）
  let mins = 0;
  events.forEach(e => {
    if (e.hour_start != null && e.hour_end != null) {
      mins += (e.hour_end - e.hour_start) * 60;
    } else if (e.duration_minutes) {
      mins += e.duration_minutes;
    }
  });
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  const hoursText = mins > 0 ? `${h}h${m > 0 ? String(m).padStart(2,'0') : ''}` : '0h';

  document.getElementById('metric-slots').textContent = slots;
  document.getElementById('metric-hours').textContent = hoursText;
  document.getElementById('metric-done').textContent = doneCnt;
  document.getElementById('load-meta').textContent = hoursText;

  document.getElementById('side-done').textContent = doneCnt;
  document.getElementById('side-open').textContent = (slots + tasks.length) - doneCnt;
}

/* ---- utils ---- */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function daysSince(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return null;
  const now = new Date();
  return Math.max(0, Math.floor((now - d) / (1000 * 60 * 60 * 24)));
}

/* ---- 导出 / 导入 ---- */
function exportData() {
  const payload = { data: D, state: getState(), exported_at: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `dashboard-${TODAY_KEY}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function importData(evt) {
  const file = evt.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const payload = JSON.parse(e.target.result);
      if (payload.state) setState(payload.state);
      if (payload.data) window.DASHBOARD_DATA = payload.data;
      render();
      alert('导入完成');
    } catch (err) { alert('导入失败: ' + err.message); }
  };
  reader.readAsText(file);
}

/* ---- 主渲染 ---- */
function render() {
  renderBrand();
  renderSideDomains();
  renderTimeline();
  renderTasks();
  renderTodoMaster();
renderProjects();
  renderWaiting();
  renderDomainsGrid();
  renderMetrics();
}

render();

/* ── Modal 层逻辑 ── */
function openProjectModal(projectId) {
  const proj = (D.projects || []).find(x => x.id === projectId);
  if (!proj) return;
  document.getElementById('modal-icon').textContent = proj.short_label || '·';
  document.getElementById('modal-icon').style.background =
    'var(--token-' + (proj.color_token || 'sage') + ')';
  document.getElementById('modal-name').textContent = proj.name;
  const body = document.getElementById('modal-body');
  let html = '';
  if (proj.description) {
    html += '<div class="m-desc">' + escapeHtml(proj.description) + '</div>';
  }
  if (proj.monthly_anchors) {
    html += '<div class="m-block-title">本月锚点</div>';
    html += '<div class="m-anchors">' + escapeHtml(proj.monthly_anchors) + '</div>';
  }
  if (proj.sections && proj.sections.length > 0) {
    proj.sections.forEach(sec => {
      const frozenCls = sec.is_frozen ? ' frozen' : '';
      html += '<div class="m-section' + frozenCls + '">';
      html += '<div class="m-section-head">';
      html += '<span class="m-section-emoji">' + (sec.emoji || '') + '</span>';
      html += '<span>' + escapeHtml(sec.name) + '</span></div>';
      if (sec.purpose) {
        html += '<div class="m-section-purpose">' + escapeHtml(sec.purpose) + '</div>';
      }
      html += '<div class="m-section-tasks">';
      (sec.subtasks || []).forEach(t => {
        html += '<div class="m-task">';
        html += '<span class="m-dot' + (t.done ? ' done' : '') + '"></span>';
        html += '<span class="m-task-text">' + escapeHtml(t.title) + '</span>';
        html += '</div>';
      });
      html += '</div></div>';
    });
  }
  if (proj.subtasks && proj.subtasks.length > 0) {
    html += '<div class="m-block-title">待办</div>';
    html += '<div class="m-section-tasks">';
    proj.subtasks.forEach(t => {
      html += '<div class="m-task">';
      html += '<span class="m-dot' + (t.done ? ' done' : '') + '"></span>';
      html += '<span class="m-task-text">' + escapeHtml(t.title) + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }
  if (proj.waiting && proj.waiting.length > 0) {
    html += '<div class="m-block-title">Waiting List</div>';
    proj.waiting.forEach(w => {
      html += '<div class="m-task"><span class="m-task-text">' + escapeHtml(w.item) + '</span></div>';
    });
  }
  if (!html) html = '<div class="m-desc" style="color:var(--ink-3)">暂无详情</div>';
  body.innerHTML = html;
  document.getElementById('project-modal-overlay').classList.add('show');
  document.getElementById('project-modal').classList.add('show');
}
function closeProjectModal() {
  document.getElementById('project-modal-overlay').classList.remove('show');
  document.getElementById('project-modal').classList.remove('show');
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeProjectModal();
});


/* ---- Todo Master 独立区 ---- */
function renderTodoMaster() {
  const container = document.getElementById('todo-master');
  if (!container) return;
  const tm = window.DASHBOARD_DATA && window.DASHBOARD_DATA.todo_master;
  if (!tm) { container.style.display = 'none'; return; }
  const subs = tm.subtasks || [];
  const doneItems = subs.filter(t => t.done);
  const frozenItems = subs.filter(t => !t.done && /^\u{1F4A4}/u.test(t.title));
  const activeItems = subs.filter(t => !t.done && !/^\u{1F4A4}/u.test(t.title));
  const waiting = tm.waiting || [];

  function escapeHtml(s) {
    return (s || '').replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }
  function makeItem(t, cls) {
    return '<div class="tm-item ' + cls + '">'
         + '<span class="tm-dot ' + (cls || '') + '"></span>'
         + '<span class="tm-text">' + escapeHtml(t.title) + '</span></div>';
  }

  let html = '<div class="tm-head">';
  html += '<div class="tm-title"><span class="tm-title-icon">T</span><span>' + escapeHtml(tm.name || '待办清单') + '</span></div>';
  html += '<div class="tm-counts">';
  html += '<span style="color:var(--token-sage)">✅ ' + doneItems.length + '</span>';
  html += '<span style="color:var(--token-blue)">⬜ ' + activeItems.length + '</span>';
  html += '<span style="color:var(--ink-3)">💤 ' + frozenItems.length + '</span>';
  if (waiting.length > 0) html += '<span style="color:var(--token-amber)">⏳ ' + waiting.length + '</span>';
  html += '</div></div>';

  html += '<div class="tm-grid">';
  html += '<div class="tm-col"><div class="tm-col-head"><span>✅ 已完成</span><span class="tm-col-badge">' + doneItems.length + '</span></div><div class="tm-list">';
  if (doneItems.length === 0) html += '<div class="tm-item" style="color:var(--ink-3);font-size:11px;">暂无</div>';
  else doneItems.forEach(t => { html += makeItem(t, 'done'); });
  html += '</div></div>';
  html += '<div class="tm-col"><div class="tm-col-head"><span>⬜ 待推进</span><span class="tm-col-badge">' + activeItems.length + '</span></div><div class="tm-list">';
  if (activeItems.length === 0) html += '<div class="tm-item" style="color:var(--ink-3);font-size:11px;">暂无</div>';
  else activeItems.forEach(t => { html += makeItem(t, ''); });
  html += '</div></div>';
  html += '<div class="tm-col"><div class="tm-col-head"><span>💤 冻结</span><span class="tm-col-badge">' + frozenItems.length + '</span></div><div class="tm-list">';
  if (frozenItems.length === 0) html += '<div class="tm-item" style="color:var(--ink-3);font-size:11px;">暂无</div>';
  else frozenItems.forEach(t => { html += makeItem(t, 'frozen'); });
  html += '</div></div>';
  html += '</div>';

  if (waiting.length > 0) {
    html += '<div class="tm-waiting"><div class="tm-waiting-head">WAITING LIST · ' + waiting.length + '</div>';
    waiting.forEach(w => {
      html += '<div class="tm-item"><span class="tm-text" style="color:var(--ink-3)">⏳ ' + escapeHtml(w.item) + '</span></div>';
    });
    html += '</div>';
  }
  container.innerHTML = html;
}

/* ---- 侧栏点击跳转 ---- */
function scrollToSection(evt, key) {
  const map = {
    today:    '.top-row',
    projects: '#projects-grid',
    master:   '.project-card.is-master',
    waiting:  '#waiting-list'
  };
  const sel = map[key];
  if (!sel) return;
  const el = document.querySelector(sel);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  document.querySelectorAll('.nav .nav-item').forEach(n => n.classList.remove('active'));
  if (evt && evt.currentTarget) evt.currentTarget.classList.add('active');
}
